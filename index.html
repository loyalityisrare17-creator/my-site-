<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhaj | Pro Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .admin-only { display: none; } /* শুরুতে আপলোড বক্স লুকিয়ে থাকবে */
        .gradient-btn { background: linear-gradient(90deg, #00d4ff, #007aff); transition: 0.3s; }
        .gradient-btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8 pb-20">

    <div class="max-w-xl mx-auto glass p-8 rounded-3xl text-center shadow-2xl animate-fade">
        <div class="w-28 h-28 mx-auto rounded-full border-4 border-cyan-500 p-1 mb-4 overflow-hidden shadow-lg">
            <img id="profilePreview" src="https://ui-avatars.com/api/?name=Minhaj&background=00d4ff&color=fff" class="w-full h-full object-cover rounded-full">
        </div>
        <h2 id="userName" class="text-3xl font-bold mb-1">Minhaj</h2>
        <p id="userBio" class="text-gray-400 text-sm mb-6 px-4">এখন আর কতটুকু চিনো?? সময় আসতে দাও আরো চিনবা 🥷</p>
        
        <a href="https://www.facebook.com/chill.r.527967" target="_blank" class="inline-flex items-center bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-full text-sm mb-6 transition">
            <i class="fab fa-facebook text-blue-500 mr-2"></i> Facebook Profile
        </a>

        <div class="mt-4">
            <button onclick="checkAdmin()" class="text-[10px] text-gray-600 hover:text-cyan-500 uppercase tracking-widest">Admin Access</button>
        </div>
    </div>

    <section id="adminPanel" class="max-w-xl mx-auto mt-8 admin-only">
        <div class="glass p-6 rounded-3xl border-2 border-dashed border-cyan-500/50 bg-cyan-500/5">
            <h3 class="text-center font-bold text-cyan-400 mb-4"><i class="fas fa-lock-open mr-2"></i> ADMIN UPLOAD PANEL</h3>
            <div class="grid grid-cols-3 gap-3">
                <label class="flex flex-col items-center p-4 bg-slate-800 rounded-2xl cursor-pointer hover:bg-slate-700">
                    <i class="fas fa-image text-green-400 mb-1"></i><span class="text-[10px]">Image</span>
                    <input type="file" class="hidden" accept="image/*" onchange="uploadFile(this, 'image')">
                </label>
                <label class="flex flex-col items-center p-4 bg-slate-800 rounded-2xl cursor-pointer hover:bg-slate-700">
                    <i class="fas fa-video text-blue-400 mb-1"></i><span class="text-[10px]">Video</span>
                    <input type="file" class="hidden" accept="video/*" onchange="uploadFile(this, 'video')">
                </label>
                <label class="flex flex-col items-center p-4 bg-slate-800 rounded-2xl cursor-pointer hover:bg-slate-700">
                    <i class="fas fa-file-code text-yellow-400 mb-1"></i><span class="text-[10px]">Files</span>
                    <input type="file" class="hidden" onchange="uploadFile(this, 'file')">
                </label>
            </div>
        </div>
    </section>

    <div class="max-w-xl mx-auto mt-10">
        <h3 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-th-large mr-2 text-cyan-400"></i> My Gallery</h3>
        <div id="gallery" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        // ১. অ্যাডমিন চেক করার পাসওয়ার্ড (তুমি চাইলে পরিবর্তন করতে পারো)
        function checkAdmin() {
            const pass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
            if (pass === "minhaj786") { // তোমার গোপন পাসওয়ার্ড
                alert("স্বাগতম মিনহাজ! এখন আপনি আপলোড করতে পারবেন।");
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("ভুল পাসওয়ার্ড! আপনি সাধারণ ইউজার হিসেবে সাইটটি দেখছেন।");
            }
        }

        // ২. ফাইল আপলোড ফাংশন
        function uploadFile(input, type) {
            const file = input.files[0];
            if (!file) return;

            const gallery = document.getElementById('gallery');
            const url = URL.createObjectURL(file);
            let contentHTML = '';

            if (type === 'image') {
                contentHTML = `<img src="${url}" class="w-full h-auto rounded-xl">`;
            } else if (type === 'video') {
                contentHTML = `<video src="${url}" controls class="w-full rounded-xl"></video>`;
            } else {
                contentHTML = `<div class="p-6 bg-slate-800 rounded-xl flex items-center justify-between">
                                <div class="flex items-center"><i class="fas fa-file-alt text-2xl mr-3 text-cyan-400"></i>
                                <span class="text-sm truncate w-40">${file.name}</span></div>
                                <a href="${url}" download="${file.name}" class="text-cyan-400 font-bold">Download</a>
                               </div>`;
            }

            const card = `
                <div class="glass p-3 rounded-2xl mb-4">
                    ${contentHTML}
                    <div class="flex justify-between items-center mt-2 px-1">
                        <span class="text-[10px] text-gray-500 uppercase font-black">${type}</span>
                        <button onclick="this.parentElement.parentElement.remove()" class="text-red-500 text-xs admin-only" style="display:block">Delete</button>
                    </div>
                </div>`;
            gallery.insertAdjacentHTML('afterbegin', card);
        }
    </script>
</body>
</html>
