<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার স্টাইলিশ সাইট ও ঘড়ি</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            width: 320px;
        }
        /* ডিজিটাল ঘড়ির স্টাইল */
        #clock {
            font-size: 40px;
            font-weight: bold;
            margin: 20px 0;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0,210,255,0.6);
        }
        h1 { font-size: 26px; margin-bottom: 5px; }
        p { opacity: 0.8; margin-bottom: 25px; }

        .fb-btn {
            display: block;
            background: #1877F2;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
        }
        .fb-btn:hover {
            transform: scale(1.05);
            background: #166fe5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>স্বাগতম! 🚀</h1>
        
        <div id="clock">00:00:00</div>
        
        <p>আসসালামুয়ালাইকুম, এটি আমার সাইট।</p>
        
        <a href="https://www.facebook.com/chill.r.527967" class="fb-btn">
            আমার ফেসবুক প্রোফাইল
        </a>
    </div>

    <script>
        // ঘড়ি চালানোর জাভাস্ক্রিপ্ট
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            
            // ০ যোগ করার জন্য (যেমন: 05)
            h = h < 10 ? "0" + h : h;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;
            
            const timeString = h + ":" + m + ":" + s;
            document.getElementById("clock").innerText = timeString;
        }

        // প্রতি সেকেন্ডে ঘড়ি আপডেট হবে
        setInterval(updateClock, 1000);
        updateClock(); // পেজ লোড হওয়ার সাথে সাথে শুরু হবে
    </script>

</body>
</html>
