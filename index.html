<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল পোর্টফোলিও</title>
    <style>
        /* ব্যাকগ্রাউন্ড স্টাইল */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364); /* আধুনিক ডার্ক গ্রেডিয়েন্ট */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* প্রফেশনাল কার্ড */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 350px;
        }

        /* ডিজিটাল ঘড়ি */
        #clock {
            font-size: 3rem;
            font-weight: bold;
            color: #00d2ff;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        h1 { font-size: 24px; margin-top: 10px; }
        p { opacity: 0.7; font-size: 16px; margin-bottom: 30px; }

        /* ফেসবুক বাটন */
        .fb-btn {
            display: inline-block;
            background: #1877F2;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(24, 119, 242, 0.3);
        }

        .fb-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.5);
            background: #166fe5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="clock">00:00:00</div>
        <h1>আসসালামুয়ালাইকুম! 🚀</h1>
        <p>এটি আমার প্রফেশনাল ওয়েবসাইট</p>
        
        <a href="https://www.facebook.com/chill.r.527967" target="_blank" class="fb-btn">
            Facebook Profile
        </a>
    </div>

    <script>
        // ডিজিটাল ঘড়ির লজিক
        function updateClock() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
