<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPlus | Modern Social Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; transition: 0.3s; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .post-card { transition: transform 0.3s ease; }
        .post-card:hover { transform: translateY(-5px); }
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="font-sans">

    <nav class="sticky top-0 z-50 glass-card px-4 py-3 flex justify-between items-center shadow-lg">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">ConnectPlus</h1>
        <div class="flex items-center gap-5">
            <i class="fas fa-home text-xl cursor-pointer hover:text-cyan-400"></i>
            <i class="fas fa-bell text-xl cursor-pointer hover:text-cyan-400"></i>
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 border-2 border-white cursor-pointer overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=User" alt="Profile">
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="hidden md:block">
            <div class="glass-card rounded-2xl p-6 text-center">
                <div class="w-20 h-20 mx-auto rounded-full border-4 border-cyan-500 mb-4 overflow-hidden">
                    <img id="displayImg" src="https://ui-avatars.com/api/?name=Guest" alt="User Avatar">
                </div>
                <h2 id="displayName" class="text-xl font-bold">Guest User</h2>
                <p id="displayBio" class="text-gray-400 text-sm mb-4">Web Developer & AI Enthusiast</p>
                <div class="flex justify-center gap-4 border-t border-slate-700 pt-4">
                    <a href="#" class="text-blue-400 hover:text-blue-300"><i class="fab fa-facebook text-xl"></i></a>
                    <button class="bg-cyan-600 hover:bg-cyan-500 px-4 py-1 rounded-full text-xs">Edit Profile</button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            
            <div class="glass-card rounded-2xl p-5 shadow-xl">
                <div class="flex gap-4 mb-4">
                    <div class="w-12 h-12 rounded-full bg-slate-700 flex-shrink-0"></div>
                    <textarea class="w-full rounded-xl p-3 outline-none resize-none h-20" placeholder="What's on your mind?"></textarea>
                </div>
                <div class="flex justify-between items-center border-t border-slate-700 pt-4">
                    <div class="flex gap-4 text-gray-400">
                        <label class="cursor-pointer hover:text-green-400"><i class="fas fa-image mr-1"></i> Photo<input type="file" class="hidden"></label>
                        <label class="cursor-pointer hover:text-blue-400"><i class="fas fa-video mr-1"></i> Video<input type="file" class="hidden"></label>
                        <label class="cursor-pointer hover:text-yellow-400"><i class="fas fa-file-archive mr-1"></i> File/APK<input type="file" class="hidden"></label>
                    </div>
                    <button class="bg-gradient-to-r from-cyan-500 to-blue-600 px-6 py-2 rounded-xl font-bold hover:opacity-90 transition">Post</button>
                </div>
            </div>

            <div class="post-card glass-card rounded-2xl overflow-hidden shadow-lg">
                <div class="p-4 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-cyan-500"></div>
                    <div>
                        <h4 class="font-bold">Rakib Hasan</h4>
                        <span class="text-xs text-gray-500">2 hours ago</span>
                    </div>
                </div>
                <div class="px-4 pb-3">
                    <p class="text-slate-300">Just finished my new personal AI assistant project! Check out the UI. 🔥</p>
                </div>
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=800" class="w-full object-cover max-h-96" alt="Post Image">
                
                <div class="p-4 flex justify-between border-t border-slate-700">
                    <button class="flex items-center gap-2 hover:text-cyan-400"><i class="far fa-thumbs-up"></i> Like</button>
                    <button class="flex items-center gap-2 hover:text-cyan-400"><i class="far fa-comment"></i> Comment</button>
                    <button class="flex items-center gap-2 hover:text-cyan-400"><i class="fas fa-share"></i> Share</button>
                </div>
            </div>

        </div>
    </main>

    <div class="md:hidden fixed bottom-0 w-full glass-card py-4 flex justify-around border-t border-slate-700">
        <i class="fas fa-home text-cyan-400"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-circle text-2xl"></i>
        <i class="fas fa-user"></i>
        <i class="fas fa-cog"></i>
    </div>

</body>
</html>
