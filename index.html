<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhaj | Pro Private Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #adminPanel { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-xl mx-auto glass p-6 rounded-3xl text-center shadow-2xl">
        <div class="w-24 h-24 mx-auto rounded-full border-4 border-cyan-500 mb-4 overflow-hidden">
            <img src="https://ui-avatars.com/api/?name=Minhaj&background=00d4ff&color=fff" class="w-full h-full object-cover">
        </div>
        <h2 class="text-2xl font-bold">Minhaj</h2>
        <p class="text-gray-400 text-sm mt-2">সময় আসতে দাও আরো চিনবা 🥷</p>
        <button onclick="checkAdmin()" class="text-[10px] text-gray-600 mt-4 block mx-auto">ADMIN ACCESS</button>
    </div>

    <div id="adminPanel" class="max-w-xl mx-auto mt-6 glass p-6 rounded-3xl border-2 border-dashed border-cyan-500/30">
        <h3 class="text-center text-cyan-400 font-bold mb-4">UPLOAD PANEL</h3>
        <input type="file" id="fileInput" class="hidden" onchange="processFile(this)">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="document.getElementById('fileInput').click()" class="bg-slate-800 p-4 rounded-xl hover:bg-slate-700">
                <i class="fas fa-plus text-cyan-400 mb-2"></i><br><span class="text-xs">Add Content</span>
            </button>
            <button onclick="clearAllData()" class="bg-red-900/30 p-4 rounded-xl hover:bg-red-900/50">
                <i class="fas fa-trash text-red-500 mb-2"></i><br><span class="text-xs">Clear All</span>
            </button>
        </div>
    </div>

    <div class="max-w-xl mx-auto mt-8">
        <h3 class="text-xl font-bold mb-4"><i class="fas fa-th-large mr-2 text-cyan-400"></i> My Gallery</h3>
        <div id="gallery" class="grid grid-cols-1 gap-6"></div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("MinhajDB", 1);

        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("files", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = e => {
            db = e.target.result;
            displayFiles();
        };

        function checkAdmin() {
            if (prompt("পাসওয়ার্ড দিন:") === "minhaj786") {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        async function processFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                const transaction = db.transaction(["files"], "readwrite");
                transaction.objectStore("files").add({
                    name: file.name,
                    type: file.type,
                    data: e.target.result,
                    date: new Date().toLocaleString()
                });
                transaction.oncomplete = () => {
                    displayFiles();
                    input.value = '';
                };
            };
            reader.readAsDataURL(file);
        }

        function displayFiles() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const store = db.transaction("files").objectStore("files");
            
            store.openCursor(null, "prev").onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    let mediaHTML = item.type.includes('image') ? 
                        `<img src="${item.data}" class="w-full rounded-xl">` :
                        `<video src="${item.data}" controls class="w-full rounded-xl"></video>`;
                    
                    if (!item.type.includes('image') && !item.type.includes('video')) {
                        mediaHTML = `<div class="p-6 bg-slate-800 rounded-xl flex justify-between">
                            <span>${item.name}</span>
                            <a href="${item.data}" download="${item.name}" class="text-cyan-400 font-bold">Download</a>
                        </div>`;
                    }

                    gallery.innerHTML += `<div class="glass p-3 rounded-2xl animate-fade">
                        ${mediaHTML}
                        <div class="mt-2 flex justify-between text-[10px] text-gray-500 px-2">
                            <span>${item.date}</span>
                            <button onclick="deleteItem(${item.id})" class="text-red-500">DELETE</button>
                        </div>
                    </div>`;
                    cursor.continue();
                }
            };
        }

        function deleteItem(id) {
            if(confirm("মুছে ফেলবেন?")) {
                db.transaction(["files"], "readwrite").objectStore("files").delete(id).onsuccess = displayFiles;
            }
        }

        function clearAllData() {
            if(confirm("সব ডাটা মুছে যাবে! আপনি কি নিশ্চিত?")) {
                db.transaction(["files"], "readwrite").objectStore("files").clear().onsuccess = displayFiles;
            }
        }
    </script>
</body>
</html>
