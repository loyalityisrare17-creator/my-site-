<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার প্রোফাইল</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1877F2, #004a99); /* ফেসবুকের থিম কালার */
            font-family: sans-serif;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 280px;
        }
        h1 { color: #333; font-size: 24px; }
        p { color: #666; margin-bottom: 20px; }
        
        /* ফেসবুক বাটন স্টাইল */
        .fb-btn {
            display: block;
            background-color: #1877F2;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .fb-btn:hover {
            background-color: #145dbf;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>স্বাগতম! 🚀</h1>
        <p>আসসালামুয়ালাইকুম। এটি আমার ওয়েবসাইট।</p>
        
        <a href="https://www.facebook.com/chill.r.527967" target="_blank" class="fb-btn">
            আমার ফেসবুক প্রোফাইল
        </a>
    </div>

</body>
</html>
